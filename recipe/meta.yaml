{% set name = "keybert" %}
{% set version = "0.9.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/keybert-{{ version }}.tar.gz
  sha256: eec8ebd37d3d9fa238d7075e727adb993de4f3ed67c94112840e4cc0e55d7657

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - sentence-transformers >=0.3.8
    - scikit-learn >=0.22.2
    - numpy >=1.18.5
    - rich >=10.4.0
    - torchvision
    - sentencepiece
    - pytorch >=1.11.0


test:
  imports:
    - keybert
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/MaartenGr/keyBERT
  summary: KeyBERT performs keyword extraction with state-of-the-art transformer models.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/MaartenGr/keyBERT
  dev_url: https://github.com/MaartenGr/keyBERT

extra:
  recipe-maintainers:
    - thomasmarwitz
